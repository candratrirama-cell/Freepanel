<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ptefree by @maramadhona</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: sans-serif; overflow-x: hidden; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; }
        .tab-btn { padding: 14px; font-weight: 800; font-size: 11px; text-transform: uppercase; transition: 0.3s; border-bottom: 3px solid transparent; width: 50%; text-align: center; cursor: pointer; color: #64748b; }
        .tab-btn.active { color: #6366f1; border-color: #6366f1; background: rgba(99, 102, 241, 0.05); }
        .ram-btn { border: 1px solid #334155; cursor: pointer; text-align: center; border-radius: 12px; padding: 12px; transition: 0.2s; background: #1e293b; }
        .ram-btn.active { border-color: #6366f1; background: #312e81; transform: scale(1.02); }
        .modal-bg { background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        .animate-pulse-fast { animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-2xl">
        <div class="text-center my-8">
            <h1 class="text-4xl font-black italic text-indigo-400 tracking-tighter">Ptefree</h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em]">By @maramadhona</p>
        </div>

        <div id="login-section" class="card p-10 text-center max-w-sm mx-auto shadow-2xl">
            <p class="mb-8 text-sm text-slate-400">Silahkan autentikasi untuk melanjutkan</p>
            <button id="btn-login" class="w-full bg-white text-black py-4 rounded-xl font-black flex items-center justify-center active:scale-95 transition">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5 mr-3"> LOGIN GOOGLE
            </button>
        </div>

        <div id="app-section" class="hidden space-y-4">
            
            <div class="card overflow-hidden flex shadow-xl">
                <div id="tab-gen" class="tab-btn active">1. Generate Account</div>
                <div id="tab-list" class="tab-btn">2. Daftar Akun Saya</div>
            </div>

            <div id="page-gen" class="space-y-4">
                <div class="card p-6 border-t-4 border-indigo-500 shadow-xl">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-black text-xs uppercase text-indigo-300 tracking-widest">Pilih Server</h3>
                        <div id="stock-info" class="text-[9px] px-3 py-1 bg-slate-800 rounded-full font-bold">Checking...</div>
                    </div>
                    
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-8">
                        <div class="ram-btn" data-ram="1GB" data-id="1" data-ads="5"><b>1GB</b><br><span class="text-[8px] opacity-60">ID 1 • 5 Ads</span></div>
                        <div class="ram-btn" data-ram="5GB" data-id="2" data-ads="20"><b>5GB</b><br><span class="text-[8px] opacity-60">ID 2 • 20 Ads</span></div>
                        <div class="ram-btn" data-ram="8GB" data-id="3" data-ads="30"><b>8GB</b><br><span class="text-[8px] opacity-60">ID 3 • 30 Ads</span></div>
                        <div class="ram-btn" data-ram="9GB" data-id="4" data-ads="35"><b>9GB</b><br><span class="text-[8px] opacity-60">ID 4 • 35 Ads</span></div>
                        <div class="ram-btn col-span-2" data-ram="UNLIMITED" data-id="5" data-ads="50"><b class="text-yellow-500">UNLIMITED</b><br><span class="text-[8px] opacity-60">ID 5 • 50 Ads</span></div>
                    </div>

                    <div class="text-center p-6 bg-slate-900 rounded-2xl border border-slate-700">
                        <p id="ad-count-text" class="text-4xl font-black text-indigo-400 mb-1">0</p>
                        <p id="ad-instruction" class="text-[9px] text-slate-500 mb-6 uppercase font-bold tracking-widest">Pilih RAM</p>
                        <button id="btn-watch-ads" class="hidden w-full py-4 bg-indigo-600 rounded-xl font-black text-sm mb-3 animate-pulse-fast shadow-lg shadow-indigo-500/20">KLIK IKLAN</button>
                        <button id="btn-claim" class="w-full py-4 bg-slate-800 text-slate-500 rounded-xl font-black text-sm cursor-not-allowed transition" disabled>KLAIM SEKARANG</button>
                    </div>
                </div>
            </div>

            <div id="page-list" class="hidden space-y-4">
                <div class="card p-6 min-h-[300px] shadow-xl">
                    <h3 class="font-black text-xs uppercase text-green-400 mb-6 flex items-center">
                        <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span> Database Akun (24 Jam)
                    </h3>
                    <div id="my-accounts-list" class="space-y-4 text-center py-20 text-xs text-slate-500 italic">
                        Belum ada akun yang diamankan.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="custom-modal" class="fixed inset-0 modal-bg z-50 hidden flex items-center justify-center p-6">
        <div class="card w-full max-w-xs p-8 text-center border-t-4 border-indigo-500 shadow-2xl">
            <div id="modal-icon" class="w-16 h-16 rounded-3xl mx-auto mb-6 flex items-center justify-center text-3xl"></div>
            <h3 id="modal-title" class="text-xl font-black mb-3"></h3>
            <div id="modal-content" class="text-sm text-slate-400 mb-8 leading-relaxed"></div>
            <button onclick="document.getElementById('custom-modal').classList.add('hidden')" class="w-full py-4 bg-indigo-600 rounded-xl font-black text-xs tracking-widest">SAYA MENGERTI</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue, query, orderByChild, equalTo, push, update, remove, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAa1YQqXXUn3ssriyyhl6mYHo47-rOcnmg",
            authDomain: "tools-ab6a6.firebaseapp.com",
            databaseURL: "https://tools-ab6a6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tools-ab6a6",
            storageBucket: "tools-ab6a6.firebasestorage.app",
            messagingSenderId: "1052074462643",
            appId: "1:1052074462643:web:b5cc8c3083889dfe514fc6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        let targetAds = 0, currentAds = 0, selectedRam = "", selectedId = "";
        const adLink = "https://widthwidowzoology.com/vmsuxp7mg0?key=e69a17094ebdb4761ca5607561ac9184";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('app-section').classList.remove('hidden');
                syncHistory(user.email);
                monitorStock();
            }
        });

        document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);

        // Tab Navigation
        const tGen = document.getElementById('tab-gen'), tList = document.getElementById('tab-list');
        const pGen = document.getElementById('page-gen'), pList = document.getElementById('page-list');
        tGen.onclick = () => { tGen.classList.add('active'); tList.classList.remove('active'); pGen.classList.remove('hidden'); pList.classList.add('hidden'); }
        tList.onclick = () => { tList.classList.add('active'); tGen.classList.remove('active'); pList.classList.remove('hidden'); pGen.classList.add('hidden'); }

        // Sync History (Updated: Handle Pending)
        function syncHistory(email) {
            onValue(ref(db, 'history_klaim'), (snap) => {
                const list = document.getElementById('my-accounts-list');
                list.innerHTML = ""; let found = false;
                const now = Date.now();
                if (snap.exists()) {
                    const data = snap.val();
                    Object.keys(data).forEach(key => {
                        const item = data[key];
                        if (item.claimed_by === email) {
                            if (now - item.claimed_at > 86400000) { 
                                remove(ref(db, `history_klaim/${key}`)); 
                            } else {
                                found = true;
                                const isPending = !item.username;
                                list.innerHTML += `
                                <div class="p-5 bg-slate-900 rounded-2xl border ${isPending ? 'border-yellow-500/40' : 'border-slate-700'} mb-4 text-left">
                                    <div class="flex justify-between mb-3 items-center">
                                        <span class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">${item.ram} SERVER</span>
                                        <span class="text-[9px] font-bold px-2 py-1 rounded ${isPending ? 'bg-yellow-500/10 text-yellow-500' : 'bg-green-500/10 text-green-500'}">
                                            ${isPending ? 'PENDING' : 'READY'}
                                        </span>
                                    </div>
                                    ${isPending ? 
                                        `<p class="text-[11px] text-slate-400 italic">Antrean Prioritas: Menunggu restok ID ${item.ram_id}. Akun otomatis muncul di sini jika admin sudah setor.</p>` : 
                                        `<div class="space-y-1 mb-4"><p class="text-xs font-mono text-slate-300">U: ${item.username}</p><p class="text-xs font-mono text-slate-300">P: ${item.password}</p></div>
                                         <a href="https://myselfpanellyi.claidexdigital.tokyo" target="_blank" class="block w-full py-3 bg-indigo-500/10 text-indigo-400 text-center rounded-xl text-[10px] font-black">LOGIN PANEL</a>`
                                    }
                                </div>`;
                            }
                        }
                    });
                }
                if(!found) list.innerHTML = `<p class="text-center py-20 text-xs text-slate-500 italic">Belum ada akun yang diamankan.</p>`;
            });
        }

        // Monitor Stock
        function monitorStock() {
            onValue(ref(db, 'stok_akun'), (snap) => {
                let count = 0;
                if (snap.exists()) {
                    Object.values(snap.val()).forEach(v => {
                        if(v.status === 'available' && (selectedId === "" || v.ram_id === selectedId)) count++;
                    });
                }
                const info = document.getElementById('stock-info');
                info.innerText = count > 0 ? `STOK: ${count} UNIT` : "STOK HABIS";
                info.className = `text-[9px] px-3 py-1 rounded-full font-bold ${count > 0 ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'}`;
            });
        }

        // Selection Logic
        document.querySelectorAll('.ram-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.ram-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedRam = btn.dataset.ram;
                selectedId = btn.dataset.id;
                targetAds = parseInt(btn.dataset.ads);
                currentAds = 0;
                document.getElementById('btn-watch-ads').classList.remove('hidden');
                document.getElementById('ad-count-text').innerText = "0 / " + targetAds;
                document.getElementById('ad-instruction').innerText = "Silahkan Klik Iklan";
                monitorStock();
            };
        });

        // Ad Logic
        document.getElementById('btn-watch-ads').onclick = () => {
            window.open(adLink, '_blank');
            currentAds++;
            document.getElementById('ad-count-text').innerText = `${currentAds} / ${targetAds}`;
            if (currentAds >= targetAds) {
                document.getElementById('btn-watch-ads').classList.add('hidden');
                const cb = document.getElementById('btn-claim');
                cb.disabled = false;
                cb.className = "w-full py-4 bg-indigo-600 text-white rounded-xl font-black text-sm active:scale-95 transition shadow-lg shadow-indigo-500/30";
            }
        };

        // CLAIM LOGIC (FIXED & IMPROVED)
        document.getElementById('btn-claim').onclick = async () => {
            const email = auth.currentUser.email;
            const curId = selectedId;
            const curRam = selectedRam;
            
            const m = document.getElementById('custom-modal'), mI = document.getElementById('modal-icon'), mT = document.getElementById('modal-title'), mC = document.getElementById('modal-content');

            try {
                // Ambil stok terbaru
                const snap = await get(query(ref(db, 'stok_akun'), orderByChild('status'), equalTo('available')));
                
                let targetKey = null, accData = null;
                if (snap.exists()) {
                    snap.forEach((child) => {
                        if (child.val().ram_id === curId && !targetKey) {
                            targetKey = child.key; accData = child.val();
                        }
                    });
                }

                if (targetKey) {
                    // ADA STOK: Tulis Riwayat, baru update stok (Agar riwayat terjamin aman)
                    const finalData = { ...accData, ram: curRam, claimed_by: email, claimed_at: Date.now() };
                    await push(ref(db, 'history_klaim'), finalData);
                    await update(ref(db, `stok_akun/${targetKey}`), { status: 'used' });

                    mI.innerHTML = "✅"; mI.className = "w-16 h-16 rounded-full mx-auto mb-6 bg-green-500/20 text-green-400 flex items-center justify-center";
                    mT.innerText = "BERHASIL"; mC.innerHTML = `Akun <b>${curRam}</b> diamankan. Cek menu <b>Daftar Akun Saya</b>.`;
                } else {
                    // HABIS: Tulis ke Riwayat sebagai Pending + masuk Antrean Prioritas
                    const pendingData = { ram: curRam, ram_id: curId, claimed_by: email, claimed_at: Date.now(), priority: true };
                    
                    await push(ref(db, 'history_klaim'), pendingData);
                    await push(ref(db, 'antrean'), pendingData);

                    mI.innerHTML = "⏳"; mI.className = "w-16 h-16 rounded-full mx-auto mb-6 bg-yellow-500/20 text-yellow-400 flex items-center justify-center";
                    mT.innerText = "ANTREAN"; mC.innerHTML = `Stok RAM <b>${curRam}</b> habis. Anda sudah masuk <b>ANTREAN PRIORITAS</b>. Akun akan dikirim otomatis ke daftar riwayat jika admin restok.`;
                }
                
                m.classList.remove('hidden');
                resetUI();
            } catch (err) {
                alert("Koneksi Error!");
                console.error(err);
            }
        };

        function resetUI() {
            currentAds = 0; selectedRam = ""; selectedId = "";
            document.querySelectorAll('.ram-btn').forEach(b => b.classList.remove('active'));
            const cBtn = document.getElementById('btn-claim');
            cBtn.disabled = true;
            cBtn.className = "w-full py-4 bg-slate-800 text-slate-500 rounded-xl font-black text-sm cursor-not-allowed";
            document.getElementById('ad-count-text').innerText = "0";
            document.getElementById('ad-instruction').innerText = "Pilih RAM";
        }
    </script>
</body>
</html>
