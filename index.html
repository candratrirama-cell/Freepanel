<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ptefree by @maramadhona</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #020617; 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent), radial-gradient(circle at bottom left, #0f172a, transparent);
        }
        .glass { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px #6366f1;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-4xl">
        
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold tracking-tight mb-2">
                Ptefree <span class="text-indigo-400">Panel</span>
            </h1>
            <p class="text-gray-400 text-sm">Created by @maramadhona</p>
        </div>

        <div id="login-section" class="glass p-8 rounded-3xl shadow-2xl max-w-md mx-auto text-center">
            <div class="w-16 h-16 bg-indigo-500/20 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8-0v4h8z"></path></svg>
            </div>
            <h2 class="text-xl font-bold mb-2">Akses Terkunci</h2>
            <p class="text-gray-400 text-sm mb-8">Silahkan login untuk melihat stok akun Pterodactyl yang tersedia.</p>
            <button id="btn-login" class="w-full bg-white text-black py-4 rounded-xl font-bold flex items-center justify-center hover:bg-gray-100 transition-all">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5 mr-3">
                Sign in with Google
            </button>
        </div>

        <div id="dashboard-section" class="hidden animate-in fade-in duration-700">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                
                <div class="lg:col-span-3 glass p-4 rounded-2xl flex justify-between items-center px-8">
                    <div class="flex items-center space-x-4">
                        <img id="user-photo" src="" class="w-10 h-10 rounded-full border-2 border-indigo-500">
                        <div>
                            <p class="text-xs text-gray-400">Selamat datang,</p>
                            <p id="user-name" class="font-bold text-indigo-300"></p>
                        </div>
                    </div>
                    <button id="btn-logout" class="text-xs bg-red-500/10 text-red-400 px-4 py-2 rounded-lg border border-red-500/20 hover:bg-red-500 hover:text-white transition">Logout</button>
                </div>

                <div class="lg:col-span-2 glass p-6 rounded-3xl">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="font-bold text-lg">Stok Akun</h3>
                        <span class="text-[10px] bg-indigo-500/20 text-indigo-300 px-2 py-1 rounded-full uppercase tracking-widest font-bold">Real-time</span>
                    </div>
                    <div id="status-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        </div>
                </div>

                <div class="glass p-6 rounded-3xl flex flex-col justify-between border-indigo-500/30">
                    <div>
                        <h3 class="font-bold mb-4 text-center">Klaim Server</h3>
                        <div class="space-y-3 mb-8">
                            <div class="flex items-start space-x-3 text-xs text-gray-400">
                                <span class="text-indigo-400">✔</span>
                                <p>Satu akun per satu user Google.</p>
                            </div>
                            <div class="flex items-start space-x-3 text-xs text-gray-400">
                                <span class="text-indigo-400">✔</span>
                                <p>Otomatis aktif setelah diklaim.</p>
                            </div>
                        </div>
                    </div>
                    <button id="btn-claim" class="btn-primary w-full py-4 rounded-2xl font-extrabold text-sm shadow-xl">
                        KLAIM AKUN SEKARANG
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue, query, orderByChild, equalTo, limitToFirst, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAa1YQqXXUn3ssriyyhl6mYHo47-rOcnmg",
            authDomain: "tools-ab6a6.firebaseapp.com",
            databaseURL: "https://tools-ab6a6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tools-ab6a6",
            storageBucket: "tools-ab6a6.firebasestorage.app",
            messagingSenderId: "1052074462643",
            appId: "1:1052074462643:web:b5cc8c3083889dfe514fc6"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getDatabase(app);
            const provider = new GoogleAuthProvider();

            const loginSec = document.getElementById('login-section');
            const dashSec = document.getElementById('dashboard-section');

            // --- Logic Auth ---
            document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider).catch(e => alert("Login Gagal: " + e.message));
            document.getElementById('btn-logout').onclick = () => signOut(auth);

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    loginSec.classList.add('hidden');
                    dashSec.classList.remove('hidden');
                    document.getElementById('user-name').innerText = user.displayName;
                    document.getElementById('user-photo').src = user.photoURL;
                    loadStok();
                } else {
                    loginSec.classList.remove('hidden');
                    dashSec.classList.add('hidden');
                }
            });

            // --- Logic Database ---
            function loadStok() {
                const stokRef = ref(db, 'stok_akun');
                onValue(stokRef, (snapshot) => {
                    const list = document.getElementById('status-list');
                    const data = snapshot.val();
                    if (!data) {
                        list.innerHTML = `<p class="col-span-2 text-center py-10 text-gray-500 italic text-sm">Belum ada stok akun yang disetor oleh Bot.</p>`;
                        return;
                    }

                    let content = "";
                    Object.keys(data).forEach(id => {
                        const item = data[id];
                        if (item.status === 'available') {
                            content += `
                            <div class="p-4 rounded-2xl bg-white/5 border border-white/10 hover:border-indigo-500/50 transition-colors">
                                <p class="text-[10px] text-indigo-400 font-bold uppercase mb-1">Server Active</p>
                                <p class="font-mono text-xs text-gray-300">ID: ${id.substring(1,9)}</p>
                            </div>`;
                        }
                    });
                    list.innerHTML = content || `<p class="col-span-2 text-center py-10 text-yellow-500 text-sm italic">Opps! Stok habis, tunggu restock berikutnya.</p>`;
                });
            }

            // --- Logic Klaim ---
            document.getElementById('btn-claim').onclick = async () => {
                const btn = document.getElementById('btn-claim');
                btn.disabled = true;
                btn.innerText = "SEDANG MENGAMBIL...";

                const q = query(ref(db, 'stok_akun'), orderByChild('status'), equalTo('available'), limitToFirst(1));
                
                onValue(q, async (snapshot) => {
                    if (snapshot.exists()) {
                        const key = Object.keys(snapshot.val())[0];
                        const acc = snapshot.val()[key];
                        
                        try {
                            // Update Status ke Firebase
                            await update(ref(db, `stok_akun/${key}`), {
                                status: 'used',
                                claimed_by: auth.currentUser.email,
                                claimed_at: Date.now()
                            });

                            alert(`KLAIM BERHASIL!\n\nUsername: ${acc.username}\nPassword: ${acc.password}\n\nSilahkan login ke panel reseller.`);
                        } catch (err) {
                            alert("Izin Ditolak: Pastikan Firebase Rules sudah diatur.");
                        }
                    } else {
                        alert("Maaf, stok sudah habis!");
                    }
                    btn.disabled = false;
                    btn.innerText = "KLAIM AKUN SEKARANG";
                }, { onlyOnce: true });
            };

        } catch (e) {
            console.error("Firebase Init Error:", e);
            document.body.innerHTML = `<div class="text-white text-center p-10">System Error: ${e.message}</div>`;
        }
    </script>
</body>
</html>
