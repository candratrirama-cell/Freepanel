<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoR 1.1 - Pterodactyl Automation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
    </script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div id="login-section" class="glass p-10 rounded-3xl shadow-2xl w-full max-w-md text-center">
        <h1 class="text-3xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
            GoR 1.1 Panel
        </h1>
        <p class="text-gray-400 mb-10 text-sm">Automasi Panel Pterodactyl Free via Firebase</p>
        
        <button id="btn-login" class="bg-white text-black px-6 py-4 rounded-xl font-bold flex items-center justify-center w-full hover:bg-gray-100 transition-all transform hover:scale-105 active:scale-95 shadow-lg">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6 h-6 mr-3">
            Masuk dengan Google
        </button>
    </div>

    <div id="dashboard-section" class="hidden w-full max-w-5xl">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-bold">Halo, <span id="user-name" class="text-blue-400">User</span>!</h2>
                <p id="user-email" class="text-gray-500 text-xs"></p>
            </div>
            <button id="btn-logout" class="bg-red-500/10 text-red-400 border border-red-500/20 px-4 py-2 rounded-lg hover:bg-red-500 hover:text-white transition">Logout</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 glass p-6 rounded-2xl">
                <h3 class="font-bold mb-6 flex items-center text-lg">
                    <span class="w-3 h-3 bg-green-500 rounded-full mr-3 animate-pulse"></span>
                    Stok Server Tersedia
                </h3>
                <div id="status-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <p class="text-gray-500 text-sm italic col-span-2 text-center py-10">Mencari stok di database...</p>
                </div>
            </div>

            <div class="glass p-6 rounded-2xl flex flex-col justify-between">
                <div>
                    <h3 class="font-bold mb-4 text-lg text-blue-400 text-center">Klaim Server</h3>
                    <div class="bg-blue-500/5 border border-blue-500/20 p-4 rounded-xl mb-6">
                        <ul class="text-xs text-gray-400 space-y-2">
                            <li>• Sistem otomatis 1 akun/user.</li>
                            <li>• Akun disetor via Bot Telegram.</li>
                            <li>• Status server dipantau real-time.</li>
                        </ul>
                    </div>
                </div>
                
                <button id="btn-claim" class="btn-gradient w-full py-4 rounded-xl font-black text-lg tracking-wider shadow-lg shadow-blue-500/20 hover:brightness-110 transition-all active:scale-95">
                    AMBIL AKUN SEKARANG
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue, query, orderByChild, equalTo, limitToFirst, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIG KAMU
        const firebaseConfig = {
            apiKey: "AIzaSyAa1YQqXXUn3ssriyyhl6mYHo47-rOcnmg",
            authDomain: "tools-ab6a6.firebaseapp.com",
            databaseURL: "https://tools-ab6a6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tools-ab6a6",
            storageBucket: "tools-ab6a6.firebasestorage.app",
            messagingSenderId: "1052074462643",
            appId: "1:1052074462643:web:b5cc8c3083889dfe514fc6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        const loginSec = document.getElementById('login-section');
        const dashSec = document.getElementById('dashboard-section');

        // Logic Login/Logout
        document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('btn-logout').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginSec.classList.add('hidden');
                dashSec.classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-email').innerText = user.email;
                monitorStok();
            } else {
                loginSec.classList.remove('hidden');
                dashSec.classList.add('hidden');
            }
        });

        // Tampilkan Stok Secara Real-time
        function monitorStok() {
            const stokRef = ref(db, 'stok_akun');
            onValue(stokRef, (snapshot) => {
                const list = document.getElementById('status-list');
                const data = snapshot.val();
                
                if (!data) {
                    list.innerHTML = `<p class="col-span-2 text-center text-gray-600">Stok belum diinput oleh Bot.</p>`;
                    return;
                }

                let cards = "";
                Object.keys(data).forEach(id => {
                    const item = data[id];
                    if (item.status === 'available') {
                        cards += `
                        <div class="p-4 rounded-xl bg-white/5 border border-white/5 flex flex-col">
                            <span class="text-[10px] text-gray-500 uppercase tracking-widest">Server Node</span>
                            <span class="font-mono text-blue-300 text-sm">ID-${id.substring(1,7)}</span>
                            <div class="mt-3 flex items-center text-[10px] text-green-400">
                                <div class="w-1.5 h-1.5 bg-green-400 rounded-full mr-2"></div> READY TO CLAIM
                            </div>
                        </div>`;
                    }
                });
                list.innerHTML = cards || `<p class="col-span-2 text-center text-yellow-600">Opps! Semua akun sudah terpakai.</p>`;
            });
        }

        // Logic Klaim Akun
        document.getElementById('btn-claim').onclick = async () => {
            const btn = document.getElementById('btn-claim');
            btn.disabled = true;
            btn.innerText = "MEMPROSES...";

            const stokRef = ref(db, 'stok_akun');
            const q = query(stokRef, orderByChild('status'), equalTo('available'), limitToFirst(1));
            
            onValue(q, async (snapshot) => {
                if (snapshot.exists()) {
                    const key = Object.keys(snapshot.val())[0];
                    const acc = snapshot.val()[key];
                    
                    try {
                        // Update status di Firebase (Butuh Rules .write: auth != null)
                        await update(ref(db, `stok_akun/${key}`), {
                            status: 'used',
                            claimed_by: auth.currentUser.email,
                            claimed_at: Date.now()
                        });

                        alert(`SUKSES!\n\nUser: ${acc.username}\nPass: ${acc.password}\nLink: ${acc.login_url || 'Cek Pterodactyl'}`);
                    } catch (e) {
                        alert("Gagal klaim: " + e.message);
                    }
                } else {
                    alert("Stok kosong! Tunggu admin setor akun via Bot.");
                }
                btn.disabled = false;
                btn.innerText = "AMBIL AKUN SEKARANG";
            }, { onlyOnce: true });
        };
    </script>
</body>
</html>
