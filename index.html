<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ptefree by @maramadhona</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; background-image: radial-gradient(circle at top right, #1e1b4b, transparent), radial-gradient(circle at bottom left, #0f172a, transparent); }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .ram-card { cursor: pointer; transition: all 0.3s ease; border: 2px solid transparent; }
        .ram-card.active { border-color: #6366f1; background: rgba(99, 102, 241, 0.1); transform: scale(1.05); }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); transition: all 0.3s ease; }
        .modal-enter { animation: modalIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-5xl mt-10">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-extrabold tracking-tighter mb-2 italic">Ptefree <span class="text-indigo-400">Panel</span></h1>
            <p class="text-gray-500 text-sm font-semibold tracking-widest uppercase">Created by @maramadhona</p>
        </div>

        <div id="login-section" class="glass p-12 rounded-[2.5rem] max-w-md mx-auto text-center border-b-4 border-indigo-500">
            <h2 class="text-3xl font-black mb-10">Gatekeeper</h2>
            <button id="btn-login" class="w-full bg-white text-black py-5 rounded-2xl font-black flex items-center justify-center hover:bg-gray-100 shadow-xl">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6 h-6 mr-3"> Login Google
            </button>
        </div>

        <div id="dashboard-section" class="hidden space-y-6">
            
            <div id="my-accounts-section" class="glass p-6 rounded-[2rem] border-l-4 border-green-500 hidden">
                <h3 class="font-black text-lg mb-4 text-green-400 italic">Akun Aktif Anda (Berlaku 24 Jam)</h3>
                <div id="my-accounts-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <div class="lg:col-span-3 glass p-8 rounded-[2.5rem]">
                    <h3 class="font-black text-xl mb-6">⚡ Pilih RAM & Kerjakan Iklan</h3>
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8" id="ram-selector">
                        <div class="ram-card glass p-4 rounded-2xl text-center" data-ram="1gb" data-ads="5">
                            <p class="text-xl font-black">1GB</p><p class="text-[9px] text-gray-500">5x Ads</p>
                        </div>
                        <div class="ram-card glass p-4 rounded-2xl text-center" data-ram="5gb" data-ads="20">
                            <p class="text-xl font-black">5GB</p><p class="text-[9px] text-gray-500">20x Ads</p>
                        </div>
                        <div class="ram-card glass p-4 rounded-2xl text-center" data-ram="8gb" data-ads="30">
                            <p class="text-xl font-black">8GB</p><p class="text-[9px] text-gray-500">30x Ads</p>
                        </div>
                        <div class="ram-card glass p-4 rounded-2xl text-center" data-ram="9gb" data-ads="35">
                            <p class="text-xl font-black">9GB</p><p class="text-[9px] text-gray-500">35x Ads</p>
                        </div>
                        <div class="ram-card glass p-4 rounded-2xl text-center border-yellow-500/20" data-ram="unlimited" data-ads="50">
                            <p class="text-xl font-black text-yellow-500">∞ GB</p><p class="text-[9px] text-gray-500">50x Ads</p>
                        </div>
                    </div>
                    <div id="status-list" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
                </div>

                <div class="glass p-8 rounded-[2.5rem] border-t-4 border-indigo-500 text-center">
                    <div class="text-2xl font-black mb-2" id="ad-count-text">0</div>
                    <p class="text-[10px] text-gray-500 mb-6 uppercase" id="ad-instruction">Pilih RAM</p>
                    <button id="btn-watch-ads" class="hidden w-full py-4 bg-indigo-500 rounded-xl font-black text-xs mb-4 animate-bounce">KLIK IKLAN</button>
                    <button id="btn-claim" class="w-full py-4 bg-gray-800 text-gray-500 rounded-xl font-black text-xs" disabled>CLAIM / QUEUE</button>
                </div>
            </div>
        </div>
    </div>

    <div id="custom-modal" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-50 hidden flex items-center justify-center p-6">
        <div class="glass max-w-md w-full p-10 rounded-[3rem] modal-enter text-center">
            <h3 id="modal-title" class="text-3xl font-black mb-6">Success!</h3>
            <div id="modal-content" class="space-y-4 text-left mb-8"></div>
            <button onclick="location.reload()" class="w-full py-4 bg-white/10 rounded-2xl font-bold">OK</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue, query, orderByChild, equalTo, limitToFirst, update, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAa1YQqXXUn3ssriyyhl6mYHo47-rOcnmg",
            authDomain: "tools-ab6a6.firebaseapp.com",
            databaseURL: "https://tools-ab6a6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tools-ab6a6",
            storageBucket: "tools-ab6a6.firebasestorage.app",
            messagingSenderId: "1052074462643",
            appId: "1:1052074462643:web:b5cc8c3083889dfe514fc6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        let targetAds = 0, currentAds = 0, selectedRam = "";
        const adLink = "https://widthwidowzoology.com/vmsuxp7mg0?key=e69a17094ebdb4761ca5607561ac9184";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
                syncMyAccounts(user.email);
                loadStok();
            }
        });

        document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);

        // Logic History & Auto Expire (1 Hari)
        function syncMyAccounts(email) {
            const historyRef = ref(db, 'history_klaim');
            onValue(historyRef, (snap) => {
                const data = snap.val();
                const container = document.getElementById('my-accounts-section');
                const list = document.getElementById('my-accounts-list');
                list.innerHTML = "";
                let hasData = false;

                if (data) {
                    const now = Date.now();
                    Object.keys(data).forEach(key => {
                        const item = data[key];
                        // Auto Delete jika > 24 jam
                        if (now - item.claimed_at > 86400000) {
                            remove(ref(db, `history_klaim/${key}`));
                        } else if (item.claimed_by === email) {
                            hasData = true;
                            list.innerHTML += `
                                <div class="p-4 bg-white/5 border border-green-500/30 rounded-2xl">
                                    <p class="text-[10px] font-bold text-green-400">RAM: ${item.ram}</p>
                                    <p class="text-sm font-mono">U: ${item.username} | P: ${item.password}</p>
                                    <a href="https://myselfpanellyi.claidexdigital.tokyo" target="_blank" class="text-[10px] text-blue-400 underline">Buka Panel</a>
                                </div>`;
                        }
                    });
                }
                container.classList.toggle('hidden', !hasData);
            });
        }

        // Pilih RAM
        document.querySelectorAll('.ram-card').forEach(card => {
            card.onclick = () => {
                document.querySelectorAll('.ram-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                selectedRam = card.dataset.ram;
                targetAds = parseInt(card.dataset.ads);
                currentAds = 0;
                document.getElementById('btn-watch-ads').classList.remove('hidden');
                document.getElementById('ad-count-text').innerText = "0 / " + targetAds;
                document.getElementById('ad-instruction').innerText = "Selesaikan Iklan";
            };
        });

        document.getElementById('btn-watch-ads').onclick = () => {
            window.open(adLink, '_blank');
            currentAds++;
            document.getElementById('ad-count-text').innerText = `${currentAds} / ${targetAds}`;
            if (currentAds >= targetAds) {
                document.getElementById('btn-watch-ads').classList.add('hidden');
                document.getElementById('btn-claim').disabled = false;
                document.getElementById('btn-claim').classList.add('btn-primary', 'text-white');
            }
        };

        function loadStok() {
            onValue(ref(db, 'stok_akun'), (snap) => {
                const list = document.getElementById('status-list');
                const data = snap.val();
                let count = 0;
                if (data) {
                    Object.values(data).forEach(v => { if(v.status === 'available') count++; });
                }
                list.innerHTML = `<div class="p-4 glass rounded-xl text-center w-full col-span-2 text-xs font-bold ${count > 0 ? 'text-green-400' : 'text-red-400'}">
                    STOCK TERSEDIA: ${count} SERVER
                </div>`;
            });
        }

        document.getElementById('btn-claim').onclick = async () => {
            const q = query(ref(db, 'stok_akun'), orderByChild('status'), equalTo('available'), limitToFirst(1));
            onValue(q, async (snap) => {
                const modal = document.getElementById('custom-modal');
                const mTitle = document.getElementById('modal-title');
                const mContent = document.getElementById('modal-content');

                if (snap.exists()) {
                    // JIKA STOK ADA
                    const key = Object.keys(snap.val())[0];
                    const acc = snap.val()[key];
                    const claimData = { ...acc, ram: selectedRam, claimed_by: auth.currentUser.email, claimed_at: Date.now() };
                    
                    await update(ref(db, `stok_akun/${key}`), { status: 'used' });
                    await push(ref(db, 'history_klaim'), claimData);

                    mTitle.innerText = "Claim Success!";
                    mContent.innerHTML = `<p class="font-mono text-sm">User: ${acc.username}<br>Pass: ${acc.password}</p>`;
                } else {
                    // JIKA STOK HABIS -> MASUK ANTREAN
                    await push(ref(db, 'antrean'), {
                        email: auth.currentUser.email,
                        ram: selectedRam,
                        timestamp: Date.now()
                    });
                    mTitle.innerText = "Masuk Antrean!";
                    mContent.innerHTML = `<p class="text-sm">Stok sedang kosong. Kamu sudah masuk daftar antrean otomatis. Cek berkala di dashboard!</p>`;
                }
                modal.classList.remove('hidden');
            }, { onlyOnce: true });
        };
    </script>
</body>
</html>
